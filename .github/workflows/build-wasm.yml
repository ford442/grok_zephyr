name: Build WASM

on:
  push:
    branches:
      - main
    paths:
      - 'native/**'
      - '.github/workflows/build-wasm.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build SGP4 WASM
        run: npm run build:wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgp4-wasm
          path: |
            public/sgp4.wasm
            public/sgp4.js
          if-no-files-found: error

      - name: Verify prebuilt WASM is committed on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git diff --exit-code public/sgp4.wasm public/sgp4.js || \
            (echo "::error::public/sgp4.{wasm,js} differ from committed copies. Run npm run build:wasm and commit." && exit 1)
